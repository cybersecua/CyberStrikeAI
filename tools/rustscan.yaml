name: "rustscan"
command: "rustscan"
enabled: true
short_description: "Ultra-fast port scanning (Rust); optional greppable, batch, and script levels"
description: |
  RustScan 2.x: fast port discovery, optionally chaining into Nmap scripts.

  **Mapping to `rustscan -h`:**
  - `-a` / `--addresses`: scan target list (comma-separated or file)
  - `-p`: comma-separated ports; `-r`: port range `start-end` (use one or combine per CLI rules)
  - `-g` / `--greppable`: output ports only, convenient for grep/piping
  - `--scripts`: **official default is default** (runs Nmap); set to **none** for port discovery only (faster)
  - `-b` batch-size, `-t` timeout, `--scan-order`, etc. for fine-tuning speed and order

  **Usage tips:**
  - Quick port scan without Nmap: set `scripts` to `none`, add `-g` if needed
  - Need service detection/scripts: use `default` or `custom`, and ensure nmap is installed locally
parameters:
  # -a, --addresses
  - name: "target"
    type: "string"
    description: |
      Maps to `-a`: comma-separated CIDRs, IPs, or hostnames; can also be a file path containing newline/list entries.
      Examples: `192.168.1.1`, `10.0.0.1,10.0.0.2`, `192.168.0.0/24`
    required: true
    flag: "-a"
    format: "flag"
  # -p, --ports; for ranges use range (-r), do not put 1-1000 in ports
  - name: "ports"
    type: "string"
    description: |
      Ports to scan, comma-separated list **only**, maps to `-p`.
      Examples: `22,80,443`, `80,443,8080`.
      For ranges like `1-1000`, use the **range** parameter (`-r`) instead; do not put ranges here.
    required: false
    flag: "-p"
    format: "flag"
  # -r, --range (use either this or ports list, or combine per official docs)
  - name: "range"
    type: "string"
    description: |
      Port range, format start-end, maps to `-r`.
      Examples: `1-1000`, `1-65535` (full range is very slow).
      For discrete ports like `22,80,443`, use **ports** (`-p`) instead; do not put them here.
    required: false
    flag: "-r"
    format: "flag"
  # -u, --ulimit
  - name: "ulimit"
    type: "int"
    description: "Increase ulimit for scanning; adjust based on system file descriptor limits"
    required: false
    flag: "-u"
    format: "flag"
    default: 5000
  # --scripts: none | default | custom (CLI default is default)
  - name: "scripts"
    type: "string"
    description: |
      Script level; **must** pass a string, do not pass true/false.
      - **none**: skip Nmap, port discovery only (fastest)
      - **default**: same as rustscan official default, invokes Nmap
      - **custom**: custom scripts, usually requires additional_args
    required: false
    flag: "--scripts"
    format: "flag"
    default: "none"
    options:
      - "none"
      - "default"
      - "custom"
  # -g, --greppable: port list only, no Nmap output
  - name: "greppable"
    type: "bool"
    description: "Greppable mode: output ports only, suitable for script parsing or writing to file"
    required: false
    flag: "-g"
    format: "flag"
    default: false
  # -b, --batch-size [default: 4500]
  - name: "batch_size"
    type: "int"
    description: "Concurrent ports per batch; higher = faster, limited by OS open file descriptors. Official default 4500"
    required: false
    flag: "-b"
    format: "flag"
  # -t, --timeout ms [default: 1500]
  - name: "timeout_ms"
    type: "int"
    description: "Per-port timeout (milliseconds). Official default 1500"
    required: false
    flag: "-t"
    format: "flag"
  # --scan-order serial | random [default: serial]
  - name: "scan_order"
    type: "string"
    description: "Scan order: serial = ascending; random = randomized"
    required: false
    flag: "--scan-order"
    format: "flag"
    options:
      - "serial"
      - "random"
  # --top: top 1000 ports
  - name: "top_ports"
    type: "bool"
    description: "Use built-in top 1000 ports (equivalent to passing `--top`)"
    required: false
    flag: "--top"
    format: "flag"
    default: false
  # -e, --exclude-ports
  - name: "exclude_ports"
    type: "string"
    description: "Exclude ports, comma-separated. Example: `80,443`"
    required: false
    flag: "-e"
    format: "flag"
  # -x, --exclude-addresses
  - name: "exclude_addresses"
    type: "string"
    description: "Exclude addresses, comma-separated CIDRs/IPs/hostnames"
    required: false
    flag: "-x"
    format: "flag"
  # --tries [default: 1]
  - name: "tries"
    type: "int"
    description: "Number of retries before marking a port as closed; 0 is corrected to 1"
    required: false
    flag: "--tries"
    format: "flag"
  - name: "additional_args"
    type: "string"
    description: |
      Options not listed above can be placed here, space-separated.
      Examples: `--no-banner`, `--udp`, `-n` (ignore config file), `-c /path/config.toml`, `--resolver 8.8.8.8`
    required: false
    format: "positional"
